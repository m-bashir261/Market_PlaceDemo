services:
  # Backend (Production)
  backend:
    build:
      context: ./Backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
    env_file:
      - .env

  # Redis
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data

  # Meilisearch
  meilisearch:
    image: getmeili/meilisearch:v1.8
    restart: always
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili-data:/meili_data

volumes:
  redis-data:
  meili-data: