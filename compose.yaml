services:
  # ---- MongoDB ----
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    env_file: .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- Express Backend ----
  backend:
    build:
      context: ./Backend
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./Backend:/app          # Mount source for live editing
      - backend-deps:/app/node_modules  # Preserve container node_modules
    env_file: .env
    environment:
      MONGO_URI: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/marketplace?authSource=admin
    depends_on:
      mongo:
        condition: service_healthy

  # ---- React Frontend ----
  frontend:
    build:
      context: ./Frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./Frontend:/app          # Mount source for hot-reload
      - frontend-deps:/app/node_modules  # Preserve container node_modules
    environment:
      WATCHPACK_POLLING: "true"  # Enables hot-reload inside Docker on all OSes
      CHOKIDAR_USEPOLLING: "true"
      WDS_SOCKET_PORT: 3000
    depends_on:
      - backend

volumes:
  mongo-data:
  backend-deps:
  frontend-deps:
