services:
  # ---- Express Backend ----
  backend:
    build:
      context: ./Backend
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./Backend:/app          # Mount source for live editing
      - backend-deps:/app/node_modules  # Preserve container node_modules
    env_file: .env
    environment:
      MONGO_URI: mongodb+srv://${MONGO_USERNAME}:${MONGO_PASSWORD}@cluster0.wfwwjwa.mongodb.net/marketplaceDB?appName=Cluster0
      MONGODB_URI: mongodb+srv://${MONGO_USERNAME}:${MONGO_PASSWORD}@cluster0.wfwwjwa.mongodb.net/marketplaceDB?appName=Cluster0

  # ---- React Frontend ----
  frontend:
    build:
      context: ./Frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./Frontend:/app          # Mount source for hot-reload
      - frontend-deps:/app/node_modules  # Preserve container node_modules
    environment:
      WATCHPACK_POLLING: "true"  # Enables hot-reload inside Docker on all OSes
      CHOKIDAR_USEPOLLING: "true"
      WDS_SOCKET_PORT: 3000
    depends_on:
      - backend

volumes:
  backend-deps:
  frontend-deps:
